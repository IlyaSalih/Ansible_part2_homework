---
- name: install apache
  ansible.builtin.apt:
    name: apache2
    state: present
    update_cache: yes

- name: deploy index.html
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: 0644
  notify: restart apache

- name: ensure apache is runing and enable
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: yes

- name: open port 80 if ufw exists
  ansible.builtin.ufw:
    rule: allow
    port: 80
    proto: tcp
  ignore_errors: yes

- name: check website is up
  ansible.builtin.uri:
    url: http://localhost
    return_content: no
    status_code: 200
...
